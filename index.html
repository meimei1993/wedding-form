<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>婚宴出席意願調查</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, #e8fbf7 0%, #d0f4ea 60%, #c2f0e6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      color: #465163;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "💍";
      position: fixed;
      font-size: 72px;
      opacity: 0.12;
      filter: blur(0.2px);
      pointer-events: none;
    }

    body::before {
      left: 6vw;
      top: 9vh;
      transform: rotate(-18deg);
    }

    body::after {
      content: "🎀";
      right: 7vw;
      bottom: 8vh;
      transform: rotate(13deg);
    }

    .container {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 30px;
      box-shadow: 0 18px 50px rgba(108, 154, 184, 0.18);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.78);
      position: relative;
      z-index: 1;
    }

    .header {
      padding: 38px 32px 30px;
      text-align: center;
      background: #d0f4ea;
      color: #2f4f4f;
      position: relative;
      overflow: hidden;
    }

    .header::before,
    .header::after {
      position: absolute;
      opacity: 0.28;
      pointer-events: none;
    }

    .header::before {
      content: "♡ ♡ ♡";
      left: 24px;
      top: 18px;
      font-size: 34px;
      transform: rotate(-12deg);
    }

    .header::after {
      content: "💒";
      right: 28px;
      bottom: 16px;
      font-size: 50px;
      transform: rotate(7deg);
    }

    .wedding-illustration {
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.48), 0 12px 26px rgba(96, 146, 178, 0.18);
      position: relative;
      font-size: 44px;
    }

    .wedding-illustration::before {
      content: "💍";
      position: absolute;
      left: -10px;
      bottom: 6px;
      font-size: 27px;
      transform: rotate(-18deg);
    }

    .wedding-illustration::after {
      content: "🕊️";
      position: absolute;
      right: -10px;
      top: 7px;
      font-size: 26px;
      transform: rotate(12deg);
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 30px;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: #1f3a3a;
    }

    .header p {
      margin: 0;
      line-height: 1.7;
      font-size: 15px;
      color: #2f4f4f;
      font-weight: 500;
    }

    form {
      padding: 32px;
      position: relative;
    }

    form::before {
      content: "♡";
      position: absolute;
      right: 24px;
      top: 18px;
      color: #ffd1df;
      font-size: 38px;
      opacity: 0.45;
    }

    .field {
      margin-bottom: 24px;
    }

    label.title {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 16px;
      color: #1f3a3a;
    }

    .required {
      color: #ff8faf;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      border: 1px solid #b8e6dc;
      border-radius: 15px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      background: #ffffff;
      color: #1f3a3a;
      transition: 0.2s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #ffadc4;
      box-shadow: 0 0 0 4px rgba(255, 173, 196, 0.18);
    }

    textarea {
      resize: vertical;
      min-height: 88px;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      border: 1px solid #b8e6dc;
      border-radius: 17px;
      background: #f6fffc;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .option-card:hover {
      border-color: #ffadc4;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(108, 154, 184, 0.12);
    }

    .option-card input {
      accent-color: #ff9bb8;
      width: 18px;
      height: 18px;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .hidden {
      display: none;
    }

    .hint {
      margin-top: 8px;
      color: #6e8391;
      font-size: 13px;
      line-height: 1.5;
    }

    .summary-box {
      background: #f0fffb;
      border: 1px dashed #9dd8ee;
      border-radius: 19px;
      padding: 16px;
      margin: 8px 0 24px;
      font-size: 14px;
      line-height: 1.8;
      color: #1f3a3a;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 19px;
      padding: 15px 18px;
      background: #7cd4c2;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(108, 154, 184, 0.25);
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(0,0,0,0.1);
      background: #66c2b0;
    }

    .result {
      display: none;
      margin-top: 20px;
      padding: 18px;
      border-radius: 19px;
      background: #f5fff8;
      border: 1px solid #bddfc9;
      line-height: 1.8;
      color: #365a3e;
    }

    .result strong {
      color: #25462d;
    }

    @media (max-width: 560px) {
      body::before,
      body::after {
        font-size: 48px;
      }

      .header {
        padding: 32px 22px 24px;
      }

      .wedding-illustration {
        width: 78px;
        height: 78px;
        font-size: 38px;
      }

      .header h1 {
        font-size: 25px;
      }

      form {
        padding: 24px 18px;
      }

      .inline-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="header">
      <div class="wedding-illustration">💞</div>
      <h1>婚宴出席意願調查</h1>
      <p>親愛的家人與朋友，為了安排座位與餐點，想麻煩您協助填寫以下資訊。<br/>📅 2026/7/25 (六) 12:00 入席<br/>📍 台中臻愛會館</p>
    </section>

    <form id="rsvpForm">
      <div class="inline-grid">
        <div class="field">
          <label class="title" for="guestName">賓客姓名<span class="required">*</span></label>
          <input id="guestName" name="guestName" type="text" placeholder="請輸入姓名" required />
        </div>

        <div class="field">
          <label class="title" for="phone">聯絡電話</label>
          <input id="phone" name="phone" type="tel" placeholder="方便聯繫用，可不填" />
        </div>
      </div>

      <div class="field">
        <label class="title">是否參加婚宴？<span class="required">*</span></label>
        <div class="options">
          <label class="option-card">
            <input type="radio" name="attendance" value="會參加" required />
            會參加，期待一起分享喜悅
          </label>
          <label class="option-card">
            <input type="radio" name="attendance" value="不克參加" />
            不克參加，先送上祝福
          </label>
        </div>
      </div>

      <div id="attendingFields">
        <div class="field">
          <label class="title">是否攜伴？<span class="required">*</span></label>
          <div class="options">
            <label class="option-card">
              <input type="radio" name="bringPartner" value="是" />
              是，會攜伴出席
            </label>
            <label class="option-card">
              <input type="radio" name="bringPartner" value="否" />
              否，僅本人出席
            </label>
          </div>
        </div>

        <div class="field">
          <label class="title" for="guestCount">出席人數<span class="required">*</span></label>
          <input id="guestCount" name="guestCount" type="number" min="1" max="10" placeholder="請填寫總出席人數" />
          <p class="hint">請填寫包含您本人、攜伴或家人在內的總出席人數。</p>
        </div>

        <div class="inline-grid">
          <div class="field">
            <label class="title">是否有人吃素？<span class="required">*</span></label>
            <div class="options">
              <label class="option-card">
                <input type="radio" name="vegetarian" value="是" />
                是
              </label>
              <label class="option-card">
                <input type="radio" name="vegetarian" value="否" />
                否
              </label>
            </div>
          </div>

          <div class="field">
            <label class="title">是否有人不吃牛肉？<span class="required">*</span></label>
            <div class="options">
              <label class="option-card">
                <input type="radio" name="noBeef" value="是" />
                是
              </label>
              <label class="option-card">
                <input type="radio" name="noBeef" value="否" />
                否
              </label>
            </div>
          </div>
        </div>

        <div class="field">
          <label class="title" for="mealNote">餐點備註</label>
          <textarea id="mealNote" name="mealNote" placeholder="例如：1 位素食、2 位不吃牛、兒童餐需求、其他忌口等"></textarea>
        </div>
      </div>

      <div class="summary-box" id="liveSummary">
        目前尚未填寫完成。填完後這裡會顯示您的回覆摘要。
      </div>

      <button type="submit">送出回覆</button>

      <div class="result" id="resultBox"></div>
    </form>
  </main>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzskYxQm54a0vfvRSqouSqnp0OQynOgDr6mlV39F4AUBpi_act-f7X_uSQgBYhBiqUQNQ/exec";

    const form = document.getElementById("rsvpForm");
    const attendingFields = document.getElementById("attendingFields");
    const liveSummary = document.getElementById("liveSummary");
    const resultBox = document.getElementById("resultBox");
    const guestCount = document.getElementById("guestCount");

    function getRadioValue(name) {
      const checked = form.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : "";
    }

    function setAttendingRequired(isAttending) {
      ["bringPartner", "vegetarian", "noBeef"].forEach((name) => {
        form.querySelectorAll(`input[name="${name}"]`).forEach((input) => {
          input.required = isAttending;
        });
      });
      guestCount.required = isAttending;
    }

    function updateVisibility() {
      const attendance = getRadioValue("attendance");
      const isAttending = attendance === "會參加";

      attendingFields.classList.toggle("hidden", attendance === "不克參加");
      setAttendingRequired(isAttending);
    }

    function updatePartnerLogic() {
      guestCount.min = 1;
      guestCount.max = 10;
    }

    function updateSummary() {
      updateVisibility();
      updatePartnerLogic();

      const name = document.getElementById("guestName").value.trim();
      const attendance = getRadioValue("attendance");
      const bringPartner = getRadioValue("bringPartner");
      const vegetarian = getRadioValue("vegetarian");
      const noBeef = getRadioValue("noBeef");
      const count = guestCount.value;

      if (!name && !attendance) {
        liveSummary.textContent = "目前尚未填寫完成。填完後這裡會顯示您的回覆摘要。";
        return;
      }

      if (attendance === "不克參加") {
        liveSummary.innerHTML = `回覆摘要：${name || "賓客"} 不克參加婚宴。`;
        return;
      }

      liveSummary.innerHTML = `
        回覆摘要：${name || "賓客"}${attendance ? `｜${attendance}` : ""}${bringPartner ? `｜攜伴：${bringPartner}` : ""}<br />
        出席人數：${count || "尚未填寫"} 位｜吃素：${vegetarian || "尚未填寫"}｜不吃牛肉：${noBeef || "尚未填寫"}
      `;
    }

    form.addEventListener("input", updateSummary);
    form.addEventListener("change", updateSummary);

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      updateSummary();

      if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("請把你的")) {
        resultBox.style.display = "block";
        resultBox.innerHTML = `
          <strong>尚未設定 Google Sheet 連線。</strong><br />
          請先把 Google Apps Script Web App URL 貼到程式中的 GOOGLE_SCRIPT_URL。
        `;
        return;
      }

      const submitButton = form.querySelector("button[type='submit']");
      submitButton.disabled = true;
      submitButton.textContent = "送出中...";

      const data = {
        姓名: document.getElementById("guestName").value.trim(),
        電話: document.getElementById("phone").value.trim(),
        參加意願: getRadioValue("attendance"),
        是否攜伴: getRadioValue("attendance") === "會參加" ? getRadioValue("bringPartner") : "不適用",
        出席人數: getRadioValue("attendance") === "會參加" ? guestCount.value : "0",
        是否吃素: getRadioValue("attendance") === "會參加" ? getRadioValue("vegetarian") : "不適用",
        是否不吃牛肉: getRadioValue("attendance") === "會參加" ? getRadioValue("noBeef") : "不適用",
        餐點備註: document.getElementById("mealNote").value.trim(),
        送出時間: new Date().toLocaleString("zh-TW", { hour12: false })
      };

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        resultBox.style.display = "block";
        resultBox.innerHTML = `
          <strong>已收到您的回覆，謝謝您！</strong><br />
          姓名：${data.姓名}<br />
          參加意願：${data.參加意願}<br />
          是否攜伴：${data.是否攜伴}<br />
          出席人數：${data.出席人數}<br />
          是否吃素：${data.是否吃素}<br />
          是否不吃牛肉：${data.是否不吃牛肉}<br />
          餐點備註：${data.餐點備註 || "無"}
        `;

        form.reset();
        guestCount.value = "";
        updateSummary();
      } catch (error) {
        resultBox.style.display = "block";
        resultBox.innerHTML = `
          <strong>送出失敗。</strong><br />
          請稍後再試，或聯繫新人協助確認。
        `;
        console.error("送出錯誤：", error);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "送出回覆";
      }
    });

    updateSummary();
  </script>
</body>
</html>
